<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#005C29">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2232/2232688.png">

    <!-- مكتبات المعالجة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

    <!-- مكتبة Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #005C29;
            --secondary: #FFD700;
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #e6f7ed 100%);
            --text: #1a2e1a;
            --radius: 15px;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-gradient); margin: 0; padding: 15px; color: var(--text); direction: rtl; padding-bottom: 50px; }
        
        header { 
            background: var(--primary); color: white; padding: 20px 15px; 
            text-align: center; border-bottom: 4px solid var(--secondary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 0 0 15px 15px;
            cursor: pointer; user-select: none;
        }

        header h1 { margin: 0; font-size: 1.8rem; pointer-events: none; }
        
        .top-dev {
            color: var(--secondary); font-size: 0.9rem; margin-top: 5px;
            font-weight: bold; letter-spacing: 0.5px; opacity: 0.9;
        }
        
        .container { max-width: 800px; margin: 20px auto; padding: 5px; }
        
        .search-box { 
            background: white; padding: 25px; border-radius: var(--radius); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px;
            text-align: center;
        }

        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        
        select, input { 
            width: 100%; padding: 12px; border: 2px solid #bbf7d0; 
            border-radius: 10px; font-size: 1rem; box-sizing: border-box; outline: none;
        }
        select:focus, input:focus { border-color: var(--primary); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        
        button { 
            flex: 1; padding: 15px; border: none; border-radius: 10px; 
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        
        .btn-search { background: var(--primary); color: white; font-size: 1.1rem; }
        .btn-top20 { background: var(--secondary); color: #004d22; }
        button:hover { transform: translateY(-2px); opacity: 0.95; }

        /* Results Container */
        #results-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .result-card { 
            background: white; border-radius: var(--radius); padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: none; 
            animation: slideUp 0.5s ease;
            border-top: 6px solid var(--primary); text-align: right;
            position: relative;
        }

        .semester-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #f0fdf4;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid #bbf7d0;
            direction: ltr;
        }

        .student-info h2 { color: var(--primary); margin: 0 0 20px 0; border-bottom: 1px solid #eee; padding-bottom: 10px; padding-left: 100px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1rem; }
        .info-val { font-weight: bold; color: #000; }

        .decision-valid { color: #059669; background: #d1fae5; padding: 2px 8px; border-radius: 5px; }
        .decision-ratt { color: #dc2626; background: #fee2e2; padding: 2px 8px; border-radius: 5px; }

        .download-btn {
            display: block; width: 100%; text-align: center; 
            background: #1e293b; color: white; padding: 15px; 
            text-decoration: none; border-radius: 10px; margin-top: 25px;
            font-weight: bold; transition: 0.3s; box-sizing: border-box; cursor: pointer; border: none;
        }
        .download-btn:hover { background: #334155; }
        .download-btn.loading { background: #94a3b8; cursor: wait; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; direction: ltr; }
        th { background: #f0fdf4; color: var(--primary); padding: 12px; text-align: left; border-bottom: 2px solid var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        tr:nth-child(even) { background: #fafafa; }
        
        .loader { display: none; text-align: center; padding: 20px; font-weight: bold; color: var(--primary); font-size: 1.1rem;}
        .error { color: #dc2626; text-align: center; display: none; margin-top: 10px; padding: 15px; background: #fee2e2; border-radius: 8px; border: 1px solid #fecaca; }

        .clickable-id { color: var(--primary); text-decoration: underline; font-weight: bold; cursor: pointer; }
        
        /* Modal Style */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-box {
            background: white; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 500px; text-align: right;
            border: 2px solid var(--secondary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .admin-btn { background: #0f172a; color: #fbbf24; margin-top: 10px; width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .close-modal { 
            position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 1.5rem; color: #aaa; 
        }
        .file-input-wrapper { margin-top: 10px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px dashed #cbd5e1; }
        
        /* Celebration */
        #celebration-msg {
            display: none; position: relative; text-align: center;
            background: linear-gradient(135deg, #fff0f5, #fff);
            padding: 25px; border-radius: 15px; margin-bottom: 20px;
            border: 2px solid #bbf7d0; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(22, 163, 74, 0.2);
        }
        .congrats-text {
            display: block; color: #16a34a; font-size: 1.8rem;
            font-weight: 900; text-shadow: 1px 1px 0 #fff;
            position: relative; z-index: 10;
            animation: bounceIn 1s infinite alternate;
        }
        .floating-particle {
            position: fixed; font-size: 2rem;
            animation: floatUp linear forwards; opacity: 1; z-index: 1000;
            pointer-events: none;
        }

        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; } 100% { transform: translateY(-100vh) rotate(360deg) scale(0.3); opacity: 0; } }
        @keyframes bounceIn { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .btn-group { flex-direction: column; } .info-row { font-size: 1rem; } }

    </style>
</head>

<!-- Admin Login & Upload Modal -->

                <input type="text" id="matricule" placeholder="رقم التسجيل (مثال: I21567)" style="text-transform: uppercase; text-align: center; direction: ltr; font-size:1.2rem; padding:15px; font-weight:bold;">

<script>
    // ==========================================
    // ⚠️ إعدادات Supabase
    // ==========================================
    const SUPABASE_URL = 'https://chjxwcliodlevzorjush.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoanh3Y2xpb2RsZXZ6b3JqdXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM3MjUzNDIsImV4cCI6MjA3OTMwMTM0Mn0.PVvBRAMsscwbnDQt5Qg6Ni9z39WeI981aBCkMnZOnJQ';
    
    // تهيئة Supabase
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_PASS = "I21567@MDA"; 
    
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed', err));
        });
    }

    const semsData = {
        'L1': { 'S1': 'Semestre 1', 'S2': 'Semestre 2' },
        'L2': { 'S3': 'Semestre 3', 'S4': 'Semestre 4' },
        'L3': { 'S5': 'Semestre 5', 'S6': 'Semestre 6' }
    };

    // توليد السنوات الأكاديمية ديناميكياً (الحالية والماضية فقط)
    function populateAcademicYears() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth(); // 0 = يناير, 8 = سبتمبر
        // إذا كنا في سبتمبر أو بعده، السنة الجامعية تبدأ من السنة الحالية. عدا ذلك تبدأ من السنة الماضية.
        const startYear = month >= 8 ? year : year - 1; 
        
        const currentAcYear = `${startYear}-${startYear + 1}`;
        const prevAcYear = `${startYear - 1}-${startYear}`;
        
        const upYearSelect = document.getElementById('up-year');
        const t20YearSelect = document.getElementById('t20-year');
        
        const optionsHTML = `<option value="${currentAcYear}">${currentAcYear}</option><option value="${prevAcYear}">${prevAcYear}</option>`;
        
        upYearSelect.innerHTML = optionsHTML;
        t20YearSelect.innerHTML = optionsHTML;
    }

    function updateUploadSemesters() { populateSemesters('up-level', 'up-semester'); }
    function updateT20Semesters() { populateSemesters('t20-level', 't20-semester'); }

    function populateSemesters(levelId, semId) {
        const lvl = document.getElementById(levelId).value;
        const semSelect = document.getElementById(semId);
        semSelect.innerHTML = '';
        if(lvl && semsData[lvl]) {
            for(let key in semsData[lvl]) {
                let opt = document.createElement('option');
                opt.value = key; opt.text = semsData[lvl][key];
                semSelect.appendChild(opt);
            }
        }
    }
    
    // Initialize default dropdowns
    populateAcademicYears();
    updateUploadSemesters();
    updateT20Semesters();

    // ==========================================
    // 🎓 ADMIN LOGIC (5 Taps)
    // ==========================================
    let tapCount = 0;
    document.getElementById('main-header').addEventListener('click', () => {
        tapCount++;
        if (tapCount === 5) {
            document.getElementById('admin-modal').style.display = 'flex';
            tapCount = 0;
        }
        setTimeout(() => tapCount = 0, 2000);
    });

    function closeAdmin() {
        document.getElementById('admin-modal').style.display = 'none';
        document.getElementById('admin-login-step').style.display = 'block';
        document.getElementById('admin-upload-step').style.display = 'none';
        document.getElementById('admin-pass').value = '';
        document.getElementById('file-details').value = '';
        document.getElementById('file-ranking').value = '';
        document.getElementById('upload-status').innerHTML = '';
    }

    function checkAdminPass() {
        if (document.getElementById('admin-pass').value === ADMIN_PASS) {
            document.getElementById('admin-login-step').style.display = 'none';
            document.getElementById('admin-upload-step').style.display = 'block';
        } else {
            const err = document.getElementById('login-error');
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 2000);
        }
    }

    async function uploadFiles() {
        const statusDiv = document.getElementById('upload-status');
        const academicYear = document.getElementById('up-year').value;
        const major = document.getElementById('up-major').value;
        const level = document.getElementById('up-level').value;
        const semester = document.getElementById('up-semester').value;
        const fileDetails = document.getElementById('file-details').files[0];
        const fileRanking = document.getElementById('file-ranking').files[0];

        if (!major || !level || !semester || !fileDetails || !fileRanking) {
            statusDiv.innerHTML = '<span style="color:red">يرجى ملء جميع الحقول واختيار الملفين.</span>'; return;
        }

        statusDiv.innerHTML = '<span style="color:#005C29">⏳ جاري الرفع... يرجى الانتظار.</span>';

        try {
            const upload = async (file, prefix) => {
                const fileName = `${prefix}_${major}_${level}_${semester}_${Date.now()}.pdf`;
                const { error } = await _supabase.storage.from('isc_results').upload(fileName, file);
                if (error) throw error;
                const { data } = _supabase.storage.from('isc_results').getPublicUrl(fileName);
                return data.publicUrl;
            };

            const detailsUrl = await upload(fileDetails, 'DETAILS');
            const rankingUrl = await upload(fileRanking, 'RANKING');

            const { error: dbError } = await _supabase.from('results_metadata')
                .insert([{ academic_year: academicYear, major, level, semester, details_url: detailsUrl, ranking_url: rankingUrl }]);

            if (dbError) throw dbError;
            
            // نجاح الرفع، تفريغ الخانات للسماح برفع ملفات جديدة مع إبقاء النافذة مفتوحة
            statusDiv.innerHTML = '<span style="color:green">✅ تم الرفع بنجاح! يمكنك رفع ملفات أخرى الآن.</span>';
            document.getElementById('file-details').value = '';
            document.getElementById('file-ranking').value = '';
            
            setTimeout(() => { 
                statusDiv.innerHTML = ''; 
            }, 5000); // الرسالة تختفي بعد 5 ثواني ولكن اللوحة تبقى مفتوحة

        } catch (err) {
            statusDiv.innerHTML = '<span style="color:red">❌ خطأ: ' + err.message + '</span>';
        }
    }

    // ==========================================
    // 🔍 STUDENT SEARCH LOGIC (Matricule Only)
    // ==========================================

    function resetView() {
        document.getElementById('results-container').innerHTML = '';
        document.getElementById('top20-container').style.display = 'none';
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('celebration-msg').style.display = 'none';
        document.querySelectorAll('.floating-particle').forEach(p => p.remove());
    }

    async function fetchRankingData(pdfUrl) {
        try {
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;
            let students =[];

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                let rows =[]; 
                textContent.items.forEach(item => {
                    const y = item.transform[5]; 
                    const str = item.str;
                    const x = item.transform[4];
                    let foundRow = rows.find(r => Math.abs(r.y - y) < 5);
                    if (foundRow) foundRow.items.push({ str, x });
                    else rows.push({ y, items:[{ str, x }] });
                });

                rows.sort((a, b) => b.y - a.y);

                rows.forEach(row => {
                    const lineItems = row.items.sort((a, b) => a.x - b.x);
                    const lineStr = lineItems.map(t => t.str).join(" ").trim();
                    
                    let match = lineStr.match(/^(\d+)\s+(I\s*\d+)\s+(.+?)\s+(\d{1,2}(?:[.,]\d{1,2})?)\s+(\d{1,2})\s+(.+)$/i);
                    let hasCredit = true;
                    
                    if (!match) {
                        match = lineStr.match(/^(\d+)\s+(I\s*\d+)\s+(.+?)\s+(\d{1,2}(?:[.,]\d{1,2})?)\s+(.+)$/i);
                        hasCredit = false;
                    }
                    
                    if(match) {
                        let cleanMatricule = match[2].replace(/\s+/g, '').toUpperCase();
                        students.push({
                            rank: parseInt(match[1]),
                            id: cleanMatricule,
                            name: match[3].trim(),
                            avg: match[4].replace(',', '.'),
                            credit: hasCredit ? match[5] : null, 
                            decision: hasCredit ? match[6].trim() : match[5].trim()
                        });
                    }
                });
            }
            return students;
        } catch (e) { return null; }
    }

    async function searchAllSemesters() {
        const matricule = document.getElementById('matricule').value.trim().toUpperCase();
        if(!matricule) { 
            showError("الرجاء إدخال رقم التسجيل للبحث."); return; 
        }

        resetView();
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        loader.innerText = '⏳ جاري جلب السجلات من قاعدة البيانات...';

        try {
            const { data: files, error } = await _supabase.from('results_metadata').select('*').order('created_at', { ascending: false });
            
            if (error) throw error;
            if (!files || files.length === 0) {
                loader.style.display = 'none';
                showError("لا توجد أي نتائج مرفوعة في النظام حالياً.");
                return;
            }

            let foundResults =[];
            const cleanInputMatricule = matricule.replace(/\s+/g, '');

            for (let i = 0; i < files.length; i++) {
                loader.innerText = `⏳ جاري البحث... (فحص سجل ${i+1} من ${files.length})`;
                const students = await fetchRankingData(files[i].ranking_url);
                
                if (students) {
                    const student = students.find(s => s.id === cleanInputMatricule);
                    if (student) {
                        const isDuplicate = foundResults.find(r => 
                            r.file.semester === files[i].semester && 
                            r.file.level === files[i].level && 
                            r.file.academic_year === files[i].academic_year
                        );
                        
                        if (!isDuplicate) {
                            foundResults.push({ student, file: files[i] });
                        }
                    }
                }
            }

            loader.style.display = 'none';

            if (foundResults.length > 0) {
                displayResults(foundResults);
            } else {
                showError("عذراً، لم يتم العثور على أي نتائج مطابقة لرقم التسجيل المدخل.");
            }

        } catch (err) {
            console.error(err);
            loader.style.display = 'none';
            showError("حدث خطأ أثناء الاتصال بقاعدة البيانات.");
        }
    }

    function displayResults(results) {
        const container = document.getElementById('results-container');
        let anyValid = false;

        results.sort((a, b) => {
            const yearA = a.file.academic_year || "0000";
            const yearB = b.file.academic_year || "0000";
            if (yearA !== yearB) {
                return yearB.localeCompare(yearA);
            }
            if (a.file.level !== b.file.level) {
                return b.file.level.localeCompare(a.file.level);
            }
            return b.file.semester.localeCompare(a.file.semester);
        });

        results.forEach(res => {
            const s = res.student;
            const f = res.file;
            const decText = s.decision.toLowerCase();
            const isValid = decText.includes('valid') || decText.includes('admis');
            const decClass = isValid ? 'decision-valid' : 'decision-ratt';
            if (isValid) anyValid = true;

            const card = document.createElement('div');
            card.className = 'result-card';
            card.style.display = 'block';
            
            const yearDisplay = f.academic_year ? `${f.academic_year} | ` : '';
            const badgeText = `${yearDisplay}${f.major} | ${f.level} - ${f.semester}`;
            
            card.innerHTML = `
                <div class="semester-badge">${badgeText}</div>
                <div class="student-info" style="margin-top: 15px;">
                    <h2>${s.name}</h2>
                    <div class="info-row"><span>رقم التسجيل:</span> <span class="info-val">${s.id}</span></div>
                    <div class="info-row"><span>المعدل العام:</span> <span class="info-val" style="color:var(--primary); font-size:1.3rem;">${s.avg}</span></div>
                    ${s.credit ? `<div class="info-row"><span>الرصيد (Crédits):</span> <span class="info-val" style="color:var(--primary); font-weight:bold;">${s.credit}</span></div>` : ''}
                    <div class="info-row"><span>الترتيب:</span> <span class="info-val" style="color:var(--secondary);">${s.rank}</span></div>
                    <div class="info-row"><span>القرار:</span> <span class="info-val ${decClass}">${s.decision}</span></div>
                </div>
                <button class="download-btn" onclick="downloadPrecisePDF('${s.id}', '${f.details_url}', this)">
                    📥 تنزيل كشف النقاط
                </button>
                <div class="dl-msg" style="text-align:center; font-size:0.8rem; color:#666; margin-top:5px; display:none;">جاري المعالجة والقص الدقيق...</div>
            `;
            container.appendChild(card);
        });

        if (anyValid) {
            document.getElementById('celebration-msg').style.display = 'block';
            startCelebration();
        }
        
        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showError(msg) {
        const errEl = document.getElementById('error-msg');
        errEl.innerText = msg;
        errEl.style.display = 'block';
    }

    // ==========================================
    // 🏆 TOP 20 LOGIC
    // ==========================================
    function openTop20Modal() {
        document.getElementById('top20-modal').style.display = 'flex';
    }
    
    function closeTop20Modal() {
        document.getElementById('top20-modal').style.display = 'none';
    }

    async function fetchAndShowTop20() {
        closeTop20Modal();
        resetView();
        
        const year = document.getElementById('t20-year').value;
        const major = document.getElementById('t20-major').value;
        const level = document.getElementById('t20-level').value;
        const semester = document.getElementById('t20-semester').value;

        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        loader.innerText = '⏳ جاري جلب قائمة الأوائل...';

        try {
            const { data, error } = await _supabase.from('results_metadata')
                .select('*')
                .eq('academic_year', year)
                .eq('major', major)
                .eq('level', level)
                .eq('semester', semester)
                .order('created_at', { ascending: false }).limit(1);

            if (error || !data || data.length === 0) {
                loader.style.display = 'none';
                showError("لا توجد نتائج مسجلة لهذا التخصص والفصل في هذه السنة الجامعية.");
                return;
            }

            const students = await fetchRankingData(data[0].ranking_url);
            loader.style.display = 'none';

            if(!students || students.length === 0) {
                showError("حدث مشكلة في قراءة الملف."); return;
            }

            students.sort((a,b) => a.rank - b.rank);
            const top20 = students.slice(0, 20);

            document.getElementById('top20-info').innerText = `${year} | ${major} - ${level} - ${semester}`;
            const tbody = document.getElementById('top20-body');
            tbody.innerHTML = '';

            top20.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td><b>${s.rank}</b></td>
                        <td><a onclick="triggerQuickSearch('${s.id}')" class="clickable-id">${s.id}</a></td>
                        <td>${s.name}</td>
                        <td style="color:var(--primary); font-weight:bold;">${s.avg}</td>
                    </tr>
                `;
            });
            
            const topContainer = document.getElementById('top20-container');
            topContainer.style.display = 'block';
            topContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

        } catch (e) {
            loader.style.display = 'none';
            showError("حدث خطأ أثناء جلب القائمة.");
        }
    }

    function triggerQuickSearch(id) {
        document.getElementById('matricule').value = id;
        searchAllSemesters();
    }

    // ==========================================
    // 🎉 الاحتفال وتحميل PDF
    // ==========================================
    function startCelebration() {
        const symbols =['🌹', '❤️', '💖', '💝', '✨', '🌸', '💕', '🎉', '⭐', '💐'];
        for (let i = 0; i < 50; i++) {
            const span = document.createElement('span');
            span.classList.add('floating-particle');
            span.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            span.style.left = Math.random() * 100 + '%';
            span.style.top = Math.random() * 50 + 50 + '%';
            span.style.animationDuration = (Math.random() * 3 + 3) + 's';
            span.style.animationDelay = Math.random() * 2 + 's';
            span.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
            document.body.appendChild(span);
            setTimeout(() => { span.remove(); }, 6000);
        }
    }

    async function downloadPrecisePDF(studentId, pdfUrl, btnElement) {
        const msg = btnElement.nextElementSibling;
        btnElement.disabled = true;
        btnElement.classList.add('loading');
        btnElement.innerText = "⏳ جاري المعالجة...";
        msg.style.display = 'block';

        try {
            const existingPdfBytes = await fetch(pdfUrl).then(res => {
                if (!res.ok) throw new Error("File not found");
                return res.arrayBuffer();
            });
            
            const loadingTask = pdfjsLib.getDocument({ data: existingPdfBytes });
            const pdfDocjs = await loadingTask.promise;
            
            let startPage = -1, startY = 0, endY = 0, spansToNextPage = false, nextPageEndY = 0;

            for (let i = 1; i <= pdfDocjs.numPages; i++) {
                const page = await pdfDocjs.getPage(i);
                const content = await page.getTextContent();
                for (let item of content.items) {
                    const itemStrClean = item.str.replace(/\s+/g, '');
                    if (itemStrClean.includes(studentId)) {
                        startPage = i - 1;
                        startY = item.transform[5];
                        let nextStudents = content.items.filter(itm => itm.str.replace(/\s+/g, '').match(/I\d{4,}/) && itm.transform[5] < startY);
                        if (nextStudents.length > 0) {
                            nextStudents.sort((a, b) => b.transform[5] - a.transform[5]);
                            endY = nextStudents[0].transform[5]; 
                        } else {
                            endY = 30; 
                            if (i < pdfDocjs.numPages) {
                                const nextPage = await pdfDocjs.getPage(i + 1);
                                const nextContent = await nextPage.getTextContent();
                                let page2Students = nextContent.items.filter(itm => itm.str.replace(/\s+/g, '').match(/I\d{4,}/));
                                if (page2Students.length > 0) {
                                    spansToNextPage = true;
                                    page2Students.sort((a, b) => b.transform[5] - a.transform[5]);
                                    nextPageEndY = page2Students[0].transform[5];
                                }
                            }
                        }
                        break;
                    }
                }
                if (startPage !== -1) break;
            }

            if (startPage === -1) throw new Error("الطالب غير موجود في ملف التفاصيل");

            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.load(existingPdfBytes);
            const newPdf = await PDFDocument.create();
            const [page1] = await newPdf.copyPages(pdfDoc,[startPage]);
            const { width, height } = page1.getSize();
            const cropTop = Math.min(height, startY + 60); 
            const cropBottom = spansToNextPage ? 0 : (endY + 10); 
            page1.setCropBox(0, cropBottom, width, cropTop - cropBottom);
            newPdf.addPage(page1);

            if (spansToNextPage) {
                const [page2] = await newPdf.copyPages(pdfDoc,[startPage + 1]);
                const page2Bottom = nextPageEndY + 10;
                page2.setCropBox(0, page2Bottom, width, height - page2Bottom);
                newPdf.addPage(page2);
            }

            const pdfBytes = await newPdf.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Resultat_${studentId}.pdf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

        } catch (error) {
            console.error(error);
            alert("حدث خطأ أثناء معالجة الملف، ربما الملف التفصيلي تالف أو الطالب غير موجود.");
        } finally {
            btnElement.disabled = false;
            btnElement.classList.remove('loading');
            btnElement.innerText = "📥 تنزيل كشف النقاط";
            msg.style.display = 'none';
        }
    }
</script>
