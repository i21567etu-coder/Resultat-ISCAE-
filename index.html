<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISCAE Résultats</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#005C29">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2232/2232688.png">

    <!-- مكتبات المعالجة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- مكتبة Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #005C29;
            --secondary: #2563eb; /* تم تغيير الذهبي إلى الأزرق */
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #e6f7ed 100%);
            --text: #1a2e1a;
            --radius: 15px;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-gradient); margin: 0; padding: 15px; color: var(--text); direction: rtl; padding-bottom: 50px; }
        
        .loader { 
            display: none; 
            text-align: center; 
            padding: 20px; 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 1.1rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        header { 
            background: var(--primary); color: white; padding: 20px 15px; 
            text-align: center; border-bottom: 4px solid var(--secondary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 0 0 15px 15px;
            cursor: pointer; user-select: none;
        }

        header h1 { margin: 0; font-size: 1.8rem; pointer-events: none; }
        
        .top-dev {
            color: #ffffff; font-size: 0.9rem; margin-top: 5px;
            font-weight: bold; letter-spacing: 0.5px; opacity: 0.9;
        }
        
        .container { max-width: 800px; margin: 20px auto; padding: 5px; }
        
        .search-box { 
            background: white; padding: 25px; border-radius: var(--radius); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px;
            text-align: center;
        }

        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        
        select, input { 
            width: 100%; padding: 12px; border: 2px solid #bbf7d0; 
            border-radius: 10px; font-size: 1rem; box-sizing: border-box; outline: none;
        }
        select:focus, input:focus { border-color: var(--primary); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        
        button { 
            flex: 1; padding: 15px; border: none; border-radius: 10px; 
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        
        .btn-search { background: var(--primary); color: white; font-size: 1.1rem; }
        .btn-top20 { background: var(--secondary); color: #ffffff; } /* اللون الجديد للزر */
        button:hover { transform: translateY(-2px); opacity: 0.95; }

        #results-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .result-card { 
            background: white; border-radius: var(--radius); padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: none; 
            animation: slideUp 0.5s ease;
            border-top: 6px solid var(--primary); text-align: right;
            position: relative;
        }

        .semester-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #f0fdf4;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid #bbf7d0;
            direction: ltr;
        }

        .student-info h2 { color: var(--primary); margin: 0 0 20px 0; border-bottom: 1px solid #eee; padding-bottom: 10px; padding-left: 100px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1rem; }
        .info-val { font-weight: bold; color: #000; }

        .decision-valid { color: #059669; background: #d1fae5; padding: 2px 8px; border-radius: 5px; }
        .decision-ratt { color: #dc2626; background: #fee2e2; padding: 2px 8px; border-radius: 5px; }

        .download-btn {
            display: block; width: 100%; text-align: center; 
            background: #1e293b; color: white; padding: 15px; 
            text-decoration: none; border-radius: 10px; margin-top: 25px;
            font-weight: bold; transition: 0.3s; box-sizing: border-box; cursor: pointer; border: none;
        }
        .download-btn:hover { background: #334155; }
        .download-btn.loading { background: #94a3b8; cursor: wait; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; direction: ltr; }
        th { background: #f0fdf4; color: var(--primary); padding: 12px; text-align: left; border-bottom: 2px solid var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        tr:nth-child(even) { background: #fafafa; }
        
        .error { color: #dc2626; text-align: center; display: none; margin-top: 10px; padding: 15px; background: #fee2e2; border-radius: 8px; border: 1px solid #fecaca; }

        .clickable-id { color: var(--secondary); text-decoration: underline; font-weight: bold; cursor: pointer; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-box {
            background: white; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 500px; text-align: right;
            border: 2px solid var(--secondary);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.3);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .admin-btn { background: #0f172a; color: #60a5fa; margin-top: 10px; width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .close-modal { 
            position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 1.5rem; color: #aaa; 
        }
        .file-input-wrapper { margin-top: 10px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px dashed #cbd5e1; }
        
        #celebration-msg {
            display: none; position: relative; text-align: center;
            background: linear-gradient(135deg, #f0f9ff, #fff);
            padding: 25px; border-radius: 15px; margin-bottom: 20px;
            border: 2px solid #bae6fd; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.1);
        }
        .congrats-text {
            display: block; color: var(--secondary); font-size: 1.8rem;
            font-weight: 900; text-shadow: 1px 1px 0 #fff;
            position: relative; z-index: 10;
            animation: bounceIn 1s infinite alternate;
        }

        @keyframes bounceIn { from { transform: scale(1); } to { transform: scale(1.05); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .btn-group { flex-direction: column; } .info-row { font-size: 1rem; } }

    </style>
</head>
<body>

<header id="main-header">
    <h1>🎓 ISCAE Résultats</h1>
    <div class="top-dev">UNEM ISCAE</div>
</header>

<div id="admin-modal" class="modal-overlay">
    <div class="modal-box">
        <span class="close-modal" onclick="closeAdmin()">✖</span>
        <div id="admin-login-step">
            <h2>🔐 دخول الإدارة</h2>
            <div class="form-group">
                <label>أدخل رمز المرور:</label>
                <input type="password" id="admin-pass" placeholder="الرمز السري">
            </div>
            <button class="admin-btn" onclick="checkAdminPass()">دخول</button>
            <p id="login-error" style="color:red; display:none; margin-top:10px;">الرمز غير صحيح!</p>
        </div>
        <div id="admin-upload-step" style="display:none;">
            <h2>📤 رفع النتائج</h2>
            <div class="form-group"><label>السنة الجامعية:</label><select id="up-year"></select></div>
            <div class="form-group">
                <label>التخصص:</label>
                <select id="up-major">
                    <option value="BA">Banque Assurance (BA)</option>
                    <option value="FC">Finance Comptabilité (FC)</option>
                    <option value="GRH">Gestion des RH (GRH)</option>
                    <option value="IG">Informatique de Gestion (IG)</option>
                    <option value="TCM">Techniques Commerciales (TCM)</option>
                    <option value="SAE">SAE</option>
                </select>
            </div>
            <div class="form-group">
                <label>المستوى:</label>
                <select id="up-level" onchange="updateUploadSemesters()">
                    <option value="L1">Licence 1 (L1)</option>
                    <option value="L2">Licence 2 (L2)</option>
                    <option value="L3">Licence 3 (L3)</option>
                </select>
            </div>
            <div class="form-group"><label>الفصل:</label><select id="up-semester"></select></div>
            <div class="file-input-wrapper"><label>📄 ملف النتائج التفصيلي:</label><input type="file" id="file-details" accept="application/pdf"></div>
            <div class="file-input-wrapper"><label>🏆 ملف الترتيب:</label><input type="file" id="file-ranking" accept="application/pdf"></div>
            <button class="admin-btn" style="margin-top:20px; background:var(--primary); color:white;" onclick="uploadFiles()">رفع البيانات</button>
            <div id="upload-status" style="margin-top:15px; font-weight:bold; font-size:0.9rem; text-align:center;"></div>
        </div>
    </div>
</div>

<div id="top20-modal" class="modal-overlay">
    <div class="modal-box">
        <span class="close-modal" onclick="closeTop20Modal()">✖</span>
        <h2>🏆 تصفية العشرون الأوائل</h2>
        <div class="form-group"><label>السنة الجامعية:</label><select id="t20-year"></select></div>
        <div class="form-group">
            <label>التخصص (Filière)</label>
            <select id="t20-major">
                <option value="BA">Banque Assurance (BA)</option>
                <option value="FC">Finance Comptabilité (FC)</option>
                <option value="GRH">Gestion des RH (GRH)</option>
                <option value="IG">Informatique de Gestion (IG)</option>
                <option value="TCM">Techniques Commerciales (TCM)</option>
                <option value="SAE">SAE</option>
            </select>
        </div>
        <div class="form-group">
            <label>المستوى (Niveau)</label>
            <select id="t20-level" onchange="updateT20Semesters()">
                <option value="L1">Licence 1 (L1)</option>
                <option value="L2">Licence 2 (L2)</option>
                <option value="L3">Licence 3 (L3)</option>
            </select>
        </div>
        <div class="form-group"><label>الفصل (Semestre)</label><select id="t20-semester"></select></div>
        <button class="admin-btn" style="background:var(--secondary); color:#fff; font-size:1.1rem; padding:12px;" onclick="fetchAndShowTop20()">عرض القائمة</button>
    </div>
</div>

<div class="container">
    <div class="search-box">
        <h3 style="color:var(--primary); margin-top:0;">استعلام سريع عن النتائج</h3>
        <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">أدخل رقم التسجيل الخاص بك للبحث في جميع الفصول المتاحة.</p>
        <form id="searchForm">
            <div class="form-group">
                <input type="text" id="matricule" placeholder="رقم التسجيل (مثال: I21567)" style="text-transform: uppercase; text-align: center; direction: ltr; font-size:1.2rem; padding:15px; font-weight:bold;">
            </div>
            <div class="btn-group">
                <button type="button" class="btn-search" onclick="searchAllSemesters()">🔍 إبحث عن نتائجي</button>
            </div>
            <div class="btn-group" style="margin-top: 10px;">
                <button type="button" class="btn-top20" onclick="openTop20Modal()">🏆 عرض العشرون الأوائل</button>
            </div>
        </form>
        <div id="loader" class="loader">⏳ جاري البحث...</div>
        <div id="error-msg" class="error"></div>
    </div>

    <div id="celebration-msg">
        <span class="congrats-text">🎉 ألف مبروك النجاح 🎉</span>
    </div>

    <div id="results-container"></div>

    <div id="top20-container" class="result-card">
        <h2 style="color:var(--primary); text-align:center;">🏆 قائمة العشرون الأوائل</h2>
        <p id="top20-info" style="text-align:center; color:#666; direction:ltr; font-weight:bold;"></p>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>#</th><th>Matricule</th><th>Nom et Prénom</th><th>Moyenne</th></tr>
                </thead>
                <tbody id="top20-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://chjxwcliodlevzorjush.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoanh3Y2xpb2RsZXZ6b3JqdXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM3MjUzNDIsImV4cCI6MjA3OTMwMTM0Mn0.PVvBRAMsscwbnDQt5Qg6Ni9z39WeI981aBCkMnZOnJQ';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_PASS = "I21567@MDA"; 
    
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed', err));
        });
    }

    const semsData = {
        'L1': { 'S1': 'Semestre 1', 'S2': 'Semestre 2' },
        'L2': { 'S3': 'Semestre 3', 'S4': 'Semestre 4' },
        'L3': { 'S5': 'Semestre 5', 'S6': 'Semestre 6' }
    };

    function populateAcademicYears() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const startYear = month >= 8 ? year : year - 1; 
        const currentAcYear = `${startYear}-${startYear + 1}`;
        const prevAcYear = `${startYear - 1}-${startYear}`;
        const optionsHTML = `<option value="${currentAcYear}">${currentAcYear}</option><option value="${prevAcYear}">${prevAcYear}</option>`;
        document.getElementById('up-year').innerHTML = optionsHTML;
        document.getElementById('t20-year').innerHTML = optionsHTML;
    }

    function updateUploadSemesters() { populateSemesters('up-level', 'up-semester'); }
    function updateT20Semesters() { populateSemesters('t20-level', 't20-semester'); }

    function populateSemesters(levelId, semId) {
        const lvl = document.getElementById(levelId).value;
        const semSelect = document.getElementById(semId);
        semSelect.innerHTML = '';
        if(lvl && semsData[lvl]) {
            for(let key in semsData[lvl]) {
                let opt = document.createElement('option');
                opt.value = key; opt.text = semsData[lvl][key];
                semSelect.appendChild(opt);
            }
        }
    }
    
    populateAcademicYears();
    updateUploadSemesters();
    updateT20Semesters();

    let tapCount = 0;
    document.getElementById('main-header').addEventListener('click', () => {
        tapCount++;
        if (tapCount === 5) {
            document.getElementById('admin-modal').style.display = 'flex';
            tapCount = 0;
        }
        setTimeout(() => tapCount = 0, 2000);
    });

    function closeAdmin() {
        document.getElementById('admin-modal').style.display = 'none';
        document.getElementById('admin-login-step').style.display = 'block';
        document.getElementById('admin-upload-step').style.display = 'none';
    }

    function checkAdminPass() {
        if (document.getElementById('admin-pass').value === ADMIN_PASS) {
            document.getElementById('admin-login-step').style.display = 'none';
            document.getElementById('admin-upload-step').style.display = 'block';
        } else {
            document.getElementById('login-error').style.display = 'block';
            setTimeout(() => document.getElementById('login-error').style.display = 'none', 2000);
        }
    }

    async function uploadFiles() {
        const statusDiv = document.getElementById('upload-status');
        const academicYear = document.getElementById('up-year').value;
        const major = document.getElementById('up-major').value;
        const level = document.getElementById('up-level').value;
        const semester = document.getElementById('up-semester').value;
        const fileDetails = document.getElementById('file-details').files[0];
        const fileRanking = document.getElementById('file-ranking').files[0];

        if (!fileDetails || !fileRanking) {
            statusDiv.innerHTML = '<span style="color:red">يرجى اختيار الملفين.</span>'; return;
        }

        statusDiv.innerHTML = '⏳ جاري الرفع...';
        try {
            const upload = async (file, prefix) => {
                const fileName = `${prefix}_${major}_${level}_${semester}_${Date.now()}.pdf`;
                const { error } = await _supabase.storage.from('isc_results').upload(fileName, file);
                if (error) throw error;
                const { data } = _supabase.storage.from('isc_results').getPublicUrl(fileName);
                return data.publicUrl;
            };
            const detailsUrl = await upload(fileDetails, 'DETAILS');
            const rankingUrl = await upload(fileRanking, 'RANKING');
            const { error: dbError } = await _supabase.from('results_metadata').insert([{ academic_year: academicYear, major, level, semester, details_url: detailsUrl, ranking_url: rankingUrl }]);
            if (dbError) throw dbError;
            statusDiv.innerHTML = '<span style="color:green">✅ تم الرفع بنجاح!</span>';
        } catch (err) { statusDiv.innerHTML = '<span style="color:red">❌ خطأ: ' + err.message + '</span>'; }
    }

    function resetView() {
        document.getElementById('results-container').innerHTML = '';
        document.getElementById('top20-container').style.display = 'none';
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('celebration-msg').style.display = 'none';
    }

    async function fetchRankingData(pdfUrl) {
        try {
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;
            let students =[];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                let rows =[]; 
                textContent.items.forEach(item => {
                    const y = item.transform[5]; 
                    const str = item.str;
                    const x = item.transform[4];
                    let foundRow = rows.find(r => Math.abs(r.y - y) < 5);
                    if (foundRow) foundRow.items.push({ str, x });
                    else rows.push({ y, items:[{ str, x }] });
                });
                rows.sort((a, b) => b.y - a.y);
                rows.forEach(row => {
                    const lineItems = row.items.sort((a, b) => a.x - b.x);
                    const lineStr = lineItems.map(t => t.str).join(" ").trim();
                    let match = lineStr.match(/^(\d+)\s+(I\s*\d+)\s+(.+?)\s+(\d{1,2}(?:[.,]\d{1,2})?)\s+(\d{1,2})\s+(.+)$/i);
                    let hasCredit = true;
                    if (!match) { match = lineStr.match(/^(\d+)\s+(I\s*\d+)\s+(.+?)\s+(\d{1,2}(?:[.,]\d{1,2})?)\s+(.+)$/i); hasCredit = false; }
                    if(match) {
                        students.push({
                            rank: parseInt(match[1]),
                            id: match[2].replace(/\s+/g, '').toUpperCase(),
                            name: match[3].trim(),
                            avg: match[4].replace(',', '.'),
                            credit: hasCredit ? match[5] : null, 
                            decision: hasCredit ? match[6].trim() : match[5].trim()
                        });
                    }
                });
            }
            return students;
        } catch (e) { return null; }
    }

    async function searchAllSemesters() {
        const matricule = document.getElementById('matricule').value.trim().toUpperCase();
        if(!matricule) { showError("الرجاء إدخال رقم التسجيل."); return; }
        resetView();
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        try {
            const { data: files, error } = await _supabase.from('results_metadata').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            let foundResults =[];
            const cleanInput = matricule.replace(/\s+/g, '');
            for (let file of files) {
                const students = await fetchRankingData(file.ranking_url);
                if (students) {
                    const student = students.find(s => s.id === cleanInput);
                    if (student) foundResults.push({ student, file });
                }
            }
            loader.style.display = 'none';
            if (foundResults.length > 0) displayResults(foundResults);
            else showError("لم يتم العثور على نتائج.");
        } catch (err) { loader.style.display = 'none'; showError("خطأ في الاتصال."); }
    }

    function displayResults(results) {
        const container = document.getElementById('results-container');
        results.forEach(res => {
            const s = res.student; const f = res.file;
            const isValid = s.decision.toLowerCase().includes('valid') || s.decision.toLowerCase().includes('admis');
            const card = document.createElement('div');
            card.className = 'result-card'; card.style.display = 'block';
            card.innerHTML = `
                <div class="semester-badge">${f.major} | ${f.level} - ${f.semester}</div>
                <div class="student-info" style="margin-top:15px;">
                    <h2>${s.name}</h2>
                    <div class="info-row"><span>رقم التسجيل:</span> <span class="info-val">${s.id}</span></div>
                    <div class="info-row"><span>المعدل:</span> <span class="info-val" style="color:var(--primary);">${s.avg}</span></div>
                    <div class="info-row"><span>الترتيب:</span> <span class="info-val" style="color:var(--secondary);">${s.rank}</span></div>
                    <div class="info-row"><span>القرار:</span> <span class="info-val ${isValid?'decision-valid':'decision-ratt'}">${s.decision}</span></div>
                </div>
                <button class="download-btn" onclick="downloadPrecisePDF('${s.id}', '${f.details_url}', this)">📥 تنزيل كشف النقاط</button>
            `;
            container.appendChild(card);
            if (isValid) document.getElementById('celebration-msg').style.display = 'block';
        });
    }

    function showError(msg) {
        const errEl = document.getElementById('error-msg');
        errEl.innerText = msg; errEl.style.display = 'block';
    }

    function openTop20Modal() { document.getElementById('top20-modal').style.display = 'flex'; }
    function closeTop20Modal() { document.getElementById('top20-modal').style.display = 'none'; }

    async function fetchAndShowTop20() {
        closeTop20Modal(); resetView();
        const loader = document.getElementById('loader'); loader.style.display = 'block';
        try {
            const { data } = await _supabase.from('results_metadata').select('*')
                .eq('academic_year', document.getElementById('t20-year').value)
                .eq('major', document.getElementById('t20-major').value)
                .eq('level', document.getElementById('t20-level').value)
                .eq('semester', document.getElementById('t20-semester').value).limit(1);
            if (!data[0]) { loader.style.display = 'none'; showError("لا توجد بيانات."); return; }
            const students = await fetchRankingData(data[0].ranking_url);
            loader.style.display = 'none';
            const top20 = students.sort((a,b)=>a.rank-b.rank).slice(0, 20);
            const tbody = document.getElementById('top20-body'); tbody.innerHTML = '';
            top20.forEach(s => {
                tbody.innerHTML += `<tr><td>${s.rank}</td><td><a onclick="triggerQuickSearch('${s.id}')" class="clickable-id">${s.id}</a></td><td>${s.name}</td><td>${s.avg}</td></tr>`;
            });
            document.getElementById('top20-container').style.display = 'block';
        } catch (e) { loader.style.display = 'none'; }
    }

    function triggerQuickSearch(id) { document.getElementById('matricule').value = id; searchAllSemesters(); }

    async function downloadPrecisePDF(studentId, pdfUrl, btnElement) {
        btnElement.disabled = true; btnElement.innerText = "⏳ جاري القص الدقيق...";
        try {
            const existingPdfBytes = await fetch(pdfUrl).then(res => res.arrayBuffer());
            const loadingTask = pdfjsLib.getDocument({ data: existingPdfBytes });
            const pdfDocjs = await loadingTask.promise;
            
            let startPage = -1, startY = 0, endY = 0, spansToNextPage = false, nextPageEndY = 0;

            for (let i = 1; i <= pdfDocjs.numPages; i++) {
                const page = await pdfDocjs.getPage(i);
                const content = await page.getTextContent();
                const items = content.items;
                for (let j=0; j<items.length; j++) {
                    if (items[j].str.replace(/\s+/g, '').includes(studentId)) {
                        startPage = i - 1;
                        startY = items[j].transform[5];
                        // البحث عن الطالب التالي في نفس الصفحة لضبط نهاية القص
                        let nextStudents = items.filter(itm => itm.str.replace(/\s+/g, '').match(/I\d{4,}/) && itm.transform[5] < startY - 10);
                        if (nextStudents.length > 0) {
                            nextStudents.sort((a, b) => b.transform[5] - a.transform[5]);
                            endY = nextStudents[0].transform[5] + 5; // ترك مساحة بسيطة جداً
                        } else {
                            endY = 20; 
                            if (i < pdfDocjs.numPages) {
                                const nextPage = await pdfDocjs.getPage(i + 1);
                                const nextContent = await nextPage.getTextContent();
                                let page2Students = nextContent.items.filter(itm => itm.str.replace(/\s+/g, '').match(/I\d{4,}/));
                                if (page2Students.length > 0) {
                                    spansToNextPage = true;
                                    page2Students.sort((a, b) => b.transform[5] - a.transform[5]);
                                    nextPageEndY = page2Students[0].transform[5] + 5;
                                }
                            }
                        }
                        break;
                    }
                }
                if (startPage !== -1) break;
            }

            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.load(existingPdfBytes);
            const newPdf = await PDFDocument.create();
            const [page1] = await newPdf.copyPages(pdfDoc,[startPage]);
            const { width, height } = page1.getSize();
            
            // تعديل الهوامش لتكون ضيقة جداً (Precision Crop)
            const cropTop = Math.min(height, startY + 35); 
            const cropBottom = spansToNextPage ? 0 : endY; 
            page1.setCropBox(0, cropBottom, width, cropTop - cropBottom);
            newPdf.addPage(page1);

            if (spansToNextPage) {
                const [page2] = await newPdf.copyPages(pdfDoc,[startPage + 1]);
                page2.setCropBox(0, nextPageEndY, width, height - nextPageEndY);
                newPdf.addPage(page2);
            }

            const pdfBytes = await newPdf.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Resultat_${studentId}.pdf`;
            link.click();
        } catch (error) { alert("حدث خطأ في معالجة الملف."); }
        finally { btnElement.disabled = false; btnElement.innerText = "📥 تنزيل كشف النقاط"; }
    }
