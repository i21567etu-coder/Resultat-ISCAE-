    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#005C29">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2232/2232688.png">

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #005C29;
            --secondary: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #e6f7ed 100%);
            --text: #1a2e1a;
            --radius: 15px;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-gradient); margin: 0; padding: 15px; color: var(--text); direction: rtl; padding-bottom: 50px; }
        
        .loader { 
            display: none; 
            text-align: center; 
            padding: 20px; 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 1.1rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        header { 
            background: var(--primary); color: white; padding: 20px 15px; 
            text-align: center; border-bottom: 4px solid var(--secondary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 0 0 15px 15px;
            cursor: pointer; user-select: none;
        }

        header h1 { margin: 0; font-size: 1.8rem; pointer-events: none; }
        
        .top-dev { color: #ffffff; font-size: 0.9rem; margin-top: 5px; font-weight: bold; letter-spacing: 0.5px; opacity: 0.9; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 5px; }
        
        .search-box { background: white; padding: 25px; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; text-align: center; }

        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        
        select, input { width: 100%; padding: 12px; border: 2px solid #bbf7d0; border-radius: 10px; font-size: 1rem; box-sizing: border-box; outline: none; }
        select:focus, input:focus { border-color: var(--primary); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .btn-search { background: var(--primary); color: white; font-size: 1.1rem; }
        .btn-top20 { background: var(--secondary); color: #ffffff; }
        button:hover { transform: translateY(-2px); opacity: 0.95; }

        #results-container { display: flex; flex-direction: column; gap: 20px; }

        .result-card { 
            background: white; border-radius: var(--radius); padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: none; 
            animation: slideUp 0.5s ease; border-top: 6px solid var(--primary);
            position: relative; scroll-margin-top: 20px; transition: all 0.3s ease;
        }

        /* تنسيق جديد للرأس (الفصل والاسم) ليكون في المنتصف وفي سطر واحد */
        .card-header-custom {
            text-align: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 15px;
        }
        .semester-badge { 
            display: inline-block;
            background: #f0fdf4; color: var(--primary); 
            padding: 6px 15px; border-radius: 20px; font-size: 0.95rem; 
            font-weight: bold; border: 1px solid #bbf7d0; direction: ltr; 
            margin-bottom: 12px;
        }
        /* تعديل لعرض الاسم كاملاً والسماح له بالنزول لسطر جديد إذا كان طويلاً */
        .student-name { 
            color: var(--primary); 
            margin: 0; 
            font-size: 1.6rem; 
            width: 100%;
            direction: ltr;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1rem; color: var(--text); }
        .info-val { font-weight: bold; color: #000; }

        .decision-valid { color: #059669; background: #d1fae5; padding: 2px 8px; border-radius: 5px; }
        .decision-ratt { color: #dc2626; background: #fee2e2; padding: 2px 8px; border-radius: 5px; }

        .download-btn { display: block; width: 100%; text-align: center; background: #1e293b; color: white; padding: 15px; text-decoration: none; border-radius: 10px; margin-top: 25px; font-weight: bold; transition: 0.3s; box-sizing: border-box; cursor: pointer; border: none; }
        .download-btn:hover { background: #334155; }
        .download-btn.loading { background: #94a3b8; cursor: wait; }

        .share-btn { display: block; width: 100%; text-align: center; background: #25D366; color: white; padding: 15px; text-decoration: none; border-radius: 10px; margin-top: 10px; font-weight: bold; transition: 0.3s; box-sizing: border-box; cursor: pointer; border: none; font-size: 1.1rem; }
        .share-btn:hover { background: #128C7E; transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; direction: ltr; }
        th { background: #f0fdf4; color: var(--primary); padding: 12px; text-align: left; border-bottom: 2px solid var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        tr:nth-child(even) { background: #fafafa; }
        
        .error { color: #dc2626; text-align: center; display: none; margin-top: 10px; padding: 15px; background: #fee2e2; border-radius: 8px; border: 1px solid #fecaca; }
        .clickable-id { color: var(--secondary); text-decoration: underline; font-weight: bold; cursor: pointer; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: right; border: 2px solid var(--secondary); box-shadow: 0 0 20px rgba(37, 99, 235, 0.3); position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-box h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .admin-btn { background: #0f172a; color: #60a5fa; margin-top: 10px; width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .close-modal { position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 1.5rem; color: #aaa; }
        .file-input-wrapper { margin-top: 10px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px dashed #cbd5e1; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* ===== تأثيرات الاحتفالية المتقدمة ===== */
        #celebrationOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; overflow: hidden; background: radial-gradient(ellipse at center, rgba(0, 92, 41, 0.15) 0%, transparent 70%); }
        .rim-confetti { position: absolute; top: -20px; z-index: 9998; animation: fallConfetti linear forwards; filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.6)); }
        .congrats-floating-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10000; width: 90%; max-width: 500px; pointer-events: none; animation: popAndFloat 8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .congrats-floating-text h2 { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: 800; font-size: clamp(2rem, 10vw, 3.5rem); color: #ffffff; margin: 0; line-height: 1.3; text-shadow: 0px 0px 30px rgba(255, 215, 0, 0.8), 0px 0px 50px rgba(0, 92, 41, 0.6), 0px 4px 20px rgba(0, 0, 0, 0.4); letter-spacing: 1px; animation: textPulse 0.6s ease-out; }
        .congrats-floating-text .emojis { display: block; font-size: clamp(2rem, 8vw, 3.5rem); margin-top: 10px; filter: drop-shadow(0px 4px 15px rgba(0,0,0,0.3)); animation: emojiJump 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        .congrats-floating-text .success-badge { display: block; font-size: clamp(0.9rem, 3vw, 1.3rem); margin-top: 12px; color: #ffc107; font-weight: 700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); animation: fadeInUp 0.8s ease-out 0.3s both; }
        .glow-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9993; pointer-events: none; animation: glowPulse 1.5s ease-in-out; }
        .shine-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9995; pointer-events: none; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shineEffect 1.2s ease-in-out; }

        @keyframes popAndFloat { 0% { transform: translate(-50%, 150%) scale(0); opacity: 0; } 10% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; } 15% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 85% { transform: translate(-50%, -60%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -100%) scale(0.8); opacity: 0; } }
        @keyframes textPulse { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes emojiJump { 0% { transform: translateY(0) scale(0); opacity: 0; } 50% { transform: translateY(-30px) scale(1.1); } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fallConfetti { 0% { transform: translateY(-10vh) rotateX(0deg) rotateY(0deg); opacity: 1; } 100% { transform: translateY(120vh) rotateX(720deg) rotateY(360deg); opacity: 0; } }
        @keyframes glowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
        @keyframes shineEffect { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        @media (max-width: 600px) { .btn-group { flex-direction: column; } .info-row { font-size: 1rem; } .student-name { font-size: 1.4rem; } }

    </style>
</head>
<body>

<header id="main-header">

        </div>
        <div class="form-group">

<div class="container">
    <div class="search-box">
        <h3 style="color:var(--primary); margin-top:0;">استعلام سريع عن النتائج</h3>
        <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">أدخل رقم التسجيل الخاص بك للبحث في جميع الفصول المتاحة.</p>
        <form id="searchForm">
            <div class="form-group"><input type="text" id="matricule" placeholder="رقم التسجيل (مثال: I21567)" style="text-transform: uppercase; text-align: center; direction: ltr; font-size:1.2rem; padding:15px; font-weight:bold;"></div>
            <div class="btn-group"><button type="button" class="btn-search" onclick="searchAllSemesters()">🔍 إبحث عن نتائجي</button></div>

        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>#</th><th>Matricule</th><th>Nom et Prénom</th><th>Moyenne</th></tr></thead>
                <tbody id="top20-body"></tbody>

        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://chjxwcliodlevzorjush.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoanh3Y2xpb2RsZXZ6b3JqdXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM3MjUzNDIsImV4cCI6MjA3OTMwMTM0Mn0.PVvBRAMsscwbnDQt5Qg6Ni9z39WeI981aBCkMnZOnJQ';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_PASS = "I21567@MDA"; 
    
    let globalFilesCache = null; 
    const pdfTextCache = {}; 

    const popSound = new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg');
    const cheerSound = new Audio('https://actions.google.com/sounds/v1/crowds/crowd_cheer.ogg');
    popSound.volume = 0.8; cheerSound.volume = 0.5;

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed', err)); });
    }

    const semsData = {
        'L1': { 'S1': 'Semestre 1', 'S2': 'Semestre 2' },
        'L2': { 'S3': 'Semestre 3', 'S4': 'Semestre 4' },
        'L3': { 'S5': 'Semestre 5', 'S6': 'Semestre 6' }
    };

    function populateAcademicYears() {
        const now = new Date(); const year = now.getFullYear(); const month = now.getMonth();
        const startYear = month >= 8 ? year : year - 1; 
        const currentAcYear = `${startYear}-${startYear + 1}`; const prevAcYear = `${startYear - 1}-${startYear}`;
        const optionsHTML = `<option value="${currentAcYear}">${currentAcYear}</option><option value="${prevAcYear}">${prevAcYear}</option>`;
        document.getElementById('up-year').innerHTML = optionsHTML; document.getElementById('t20-year').innerHTML = optionsHTML;
    }

    function updateUploadSemesters() { populateSemesters('up-level', 'up-semester'); }
    function updateT20Semesters() { populateSemesters('t20-level', 't20-semester'); }

    function populateSemesters(levelId, semId) {
        const lvl = document.getElementById(levelId).value; const semSelect = document.getElementById(semId);
        semSelect.innerHTML = '';
        if(lvl && semsData[lvl]) {
            for(let key in semsData[lvl]) {
                let opt = document.createElement('option'); opt.value = key; opt.text = semsData[lvl][key]; semSelect.appendChild(opt);
            }
        }
    }
    
    populateAcademicYears(); updateUploadSemesters(); updateT20Semesters();

    let tapCount = 0;
    document.getElementById('main-header').addEventListener('click', () => {
        tapCount++;
        if (tapCount === 5) { document.getElementById('admin-modal').style.display = 'flex'; tapCount = 0; }
        setTimeout(() => tapCount = 0, 2000);
    });

    function closeAdmin() {
        document.getElementById('admin-modal').style.display = 'none';
        document.getElementById('admin-login-step').style.display = 'block';
        document.getElementById('admin-upload-step').style.display = 'none';
    }

    function checkAdminPass() {
        if (document.getElementById('admin-pass').value === ADMIN_PASS) {
            document.getElementById('admin-login-step').style.display = 'none';
            document.getElementById('admin-upload-step').style.display = 'block';
        } else {
            document.getElementById('login-error').style.display = 'block';
            setTimeout(() => document.getElementById('login-error').style.display = 'none', 2000);
        }
    }

    async function uploadFiles() {
        const statusDiv = document.getElementById('upload-status');
        const academicYear = document.getElementById('up-year').value; const major = document.getElementById('up-major').value;
        const level = document.getElementById('up-level').value; const semester = document.getElementById('up-semester').value;
        const fileDetails = document.getElementById('file-details').files[0]; const fileRanking = document.getElementById('file-ranking').files[0];

        if (!fileDetails || !fileRanking) { statusDiv.innerHTML = '<span style="color:red">يرجى اختيار الملفين.</span>'; return; }

        statusDiv.innerHTML = '⏳ جاري الرفع...';
        try {
            const upload = async (file, prefix) => {
                const fileName = `${prefix}_${major}_${level}_${semester}_${Date.now()}.pdf`;
                const { error } = await _supabase.storage.from('isc_results').upload(fileName, file);
                if (error) throw error;
                const { data } = _supabase.storage.from('isc_results').getPublicUrl(fileName); return data.publicUrl;
            };
            const detailsUrl = await upload(fileDetails, 'DETAILS'); const rankingUrl = await upload(fileRanking, 'RANKING');
            const { error: dbError } = await _supabase.from('results_metadata').insert([{ academic_year: academicYear, major, level, semester, details_url: detailsUrl, ranking_url: rankingUrl }]);
            if (dbError) throw dbError;
            
            globalFilesCache = null; 
            statusDiv.innerHTML = '<span style="color:green">✅ تم الرفع بنجاح!</span>';
        } catch (err) { statusDiv.innerHTML = '<span style="color:red">❌ خطأ: ' + err.message + '</span>'; }
    }

    function resetView() {
        document.getElementById('results-container').innerHTML = ''; document.getElementById('top20-container').style.display = 'none';
        document.getElementById('error-msg').style.display = 'none'; closeCelebration();
    }

    async function searchStudentInPDF(file, targetId) {
        const cacheKey = file.ranking_url;
        if (!pdfTextCache[cacheKey]) {
            try {
                const loadingTask = pdfjsLib.getDocument(file.ranking_url); const pdf = await loadingTask.promise;
                const pagesData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i); const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(t => t.str).join('').replace(/\s+/g, '').toUpperCase();
                    pagesData.push({ textContent, pageText });
                }
                pdfTextCache[cacheKey] = pagesData;
            } catch(e) { return null; }
        }

        const pagesData = pdfTextCache[cacheKey];
        for (let pageData of pagesData) {
            if (!pageData.pageText.includes(targetId)) continue;

            let rows =[];
            pageData.textContent.items.forEach(item => {
                const y = item.transform[5]; const str = item.str; const x = item.transform[4];
                let foundRow = rows.find(r => Math.abs(r.y - y) < 5);
                if (foundRow) foundRow.items.push({ str, x }); else rows.push({ y, items: [{ str, x }] });
            });
            
            rows.sort((a, b) => b.y - a.y);
            for (let row of rows) {
                const lineItems = row.items.sort((a, b) => a.x - b.x); const lineStr = lineItems.map(t => t.str).join(" ").trim();
                let match = lineStr.match(/^(\d+)\s+(I\s*\d+)\s+(.+?)\s+(\d{1,2}(?:[.,]\d{1,2})?)\s+(\d{1,2})\s+(.+)$/i);
                let hasCredit = true;
                if (!match) { match = lineStr.match(/^(\d+)\s+(I\s*\d+)\s+(.+?)\s+(\d{1,2}(?:[.,]\d{1,2})?)\s+(.+)$/i); hasCredit = false; }
                
                if (match) {
                    const id = match[2].replace(/\s+/g, '').toUpperCase();
                    if (id === targetId) {
                        return { file: file, student: { rank: parseInt(match[1]), id: id, name: match[3].trim(), avg: match[4].replace(',', '.'), credit: hasCredit ? match[5] : null, decision: hasCredit ? match[6].trim() : match[5].trim() } };
                    }
                }
            }
        }
        return null;
    }

    async function fetchRankingData(pdfUrl) {
        const cacheKey = pdfUrl;
        if (!pdfTextCache[cacheKey]) {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfUrl); const pdf = await loadingTask.promise;
                const pagesData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i); const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(t => t.str).join('').replace(/\s+/g, '').toUpperCase(); pagesData.push({ textContent, pageText });
                }
                pdfTextCache[cacheKey] = pagesData;
            } catch(e) { return null; }
        }

        const pagesData = pdfTextCache[cacheKey]; let students =[];
        pagesData.forEach(pageData => {
            let rows =[]; 
            pageData.textContent.items.forEach(item => {
                const y = item.transform[5]; const str = item.str; const x = item.transform[4];
                let foundRow = rows.find(r => Math.abs(r.y - y) < 5);
                if (foundRow) foundRow.items.push({ str, x }); else rows.push({ y, items:[{ str, x }] });
            });
            rows.sort((a, b) => b.y - a.y);
            rows.forEach(row => {
                const lineItems = row.items.sort((a, b) => a.x - b.x); const lineStr = lineItems.map(t => t.str).join(" ").trim();
                let match = lineStr.match(/^(\d+)\s+(I\s*\d+)\s+(.+?)\s+(\d{1,2}(?:[.,]\d{1,2})?)\s+(\d{1,2})\s+(.+)$/i);
                let hasCredit = true;
                if (!match) { match = lineStr.match(/^(\d+)\s+(I\s*\d+)\s+(.+?)\s+(\d{1,2}(?:[.,]\d{1,2})?)\s+(.+)$/i); hasCredit = false; }
                if(match) { students.push({ rank: parseInt(match[1]), id: match[2].replace(/\s+/g, '').toUpperCase(), name: match[3].trim(), avg: match[4].replace(',', '.'), credit: hasCredit ? match[5] : null, decision: hasCredit ? match[6].trim() : match[5].trim() }); }
            });
        });
        return students;
    }

    async function searchAllSemesters() {
        const matricule = document.getElementById('matricule').value.trim().toUpperCase();
        if(!matricule) { showError("الرجاء إدخال رقم التسجيل."); return; }
        resetView();
        const loader = document.getElementById('loader'); loader.style.display = 'block';
        
        try {
            let files;
            if (globalFilesCache) { files = globalFilesCache; } 
            else {
                const { data, error } = await _supabase.from('results_metadata').select('*').order('created_at', { ascending: false });
                if (error) throw error; globalFilesCache = data; files = data;
            }
            
            const cleanInput = matricule.replace(/\s+/g, '');
            const searchPromises = files.map(file => searchStudentInPDF(file, cleanInput));
            const rawResults = await Promise.all(searchPromises);
            let foundResults = rawResults.filter(res => res !== null);
            
            foundResults.sort((a, b) => {
                if (a.file.academic_year !== b.file.academic_year) return a.file.academic_year > b.file.academic_year ? -1 : 1;
                if (a.file.semester !== b.file.semester) return a.file.semester > b.file.semester ? -1 : 1;
                return 0;
            });

            loader.style.display = 'none';
            
            if (foundResults.length > 0) {
                displayResults(foundResults);
                
                const latestResult = foundResults[0].student;
                const latestIsValid = latestResult.decision.toLowerCase().includes('valid') || latestResult.decision.toLowerCase().includes('admis');
                const latestAvg = parseFloat(latestResult.avg) || 0;
                
                if (latestIsValid) {
                    const isHonorable = (latestAvg >= 13);
                    triggerCelebration(isHonorable);
                    setTimeout(() => { const firstCard = document.querySelector('.result-card'); if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 3500);
                } else {
                    setTimeout(() => { const firstCard = document.querySelector('.result-card'); if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 200);
                }
            } else { showError("لم يتم العثور على نتائج."); }
        } catch (err) { loader.style.display = 'none'; showError("خطأ في الاتصال."); }
    }

    function createConfettiPiece() {
        const overlay = document.getElementById('celebrationOverlay');
        if (overlay.style.display === 'none') return;
        
        const colors = ['#FF007F', '#00FF00', '#FFEA00', '#00E5FF', '#B900FF'];
        const el = document.createElement('div');
        el.classList.add('rim-confetti'); el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        el.style.left = Math.random() * 100 + 'vw'; el.style.animationDuration = (Math.random() * 3 + 2) + 's'; el.style.animationDelay = Math.random() * 2 + 's';

        if (Math.random() > 0.3) { const size = Math.random() * 10 + 10 + 'px'; el.style.width = size; el.style.height = size; el.style.borderRadius = '50%'; } 
        else { el.style.width = Math.random() * 15 + 15 + 'px'; el.style.height = Math.random() * 5 + 5 + 'px'; el.style.borderRadius = '10px'; }
        overlay.appendChild(el); setTimeout(() => { el.remove(); }, 6000);
    }

    function triggerCelebration(isHonorable) {
        const overlay = document.getElementById('celebrationOverlay');
        overlay.style.display = 'block'; overlay.innerHTML = '';

        try { popSound.currentTime = 0; popSound.play(); setTimeout(() => { cheerSound.currentTime = 0; cheerSound.play(); }, 300); } catch (err) {}

        const glow = document.createElement('div'); glow.className = 'glow-background';
        const shine = document.createElement('div'); shine.className = 'shine-effect';
        overlay.appendChild(glow); overlay.appendChild(shine);

        let badgeHtml = ''; if (isHonorable) badgeHtml = '<span class="success-badge">نتيجة مشرفة 🏆</span>';

        const textEl = document.createElement('div'); textEl.className = 'congrats-floating-text';
        textEl.innerHTML = `<h2>ألف مبروك النجاح</h2><span class="emojis">🎊🎉</span>${badgeHtml}`;
        overlay.appendChild(textEl);

        for(let i = 0; i < 150; i++) { createConfettiPiece(); } setTimeout(closeCelebration, 8000);
    }

    function closeCelebration() {
        const overlay = document.getElementById('celebrationOverlay'); overlay.style.display = 'none'; overlay.innerHTML = '';
        try { cheerSound.pause(); cheerSound.currentTime = 0; } catch (e) {}
    }

    // --- دالة مشاركة النتيجة مع التصميم المتجاوب الجديد وإصلاحات الاسم والرابط ---

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

                <p style="color: #ffffff; font-size: 24px; margin: 0; font-weight: 800; line-height: 1.6; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">
                    يهنئكم الاتحاد الوطني لطلبة موريتانيا قسم ISCAE بالنجاح ونتمنى لكم مسيرة موفقة 🌟
                </p>
            </div>
            
            <div style="background: #ffffff; border-radius: 20px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); position: relative;">
                
                <div style="text-align: center; border-bottom: 2px solid #f0fdf4; padding-bottom: 20px; margin-bottom: 25px;">
                    <div style="display: inline-block; background: #f0fdf4; color: #005C29; padding: 8px 20px; border-radius: 25px; font-size: 16px; font-weight: bold; border: 1px solid #bbf7d0; direction: ltr; margin-bottom: 15px;">
                        ${semesterText}
                    </div>
                    <!-- تم تعديل كود الاسم للسماح له بالنزول لسطر جديد بدلاً من القص -->
                    <h2 style="color: #005C29; margin: 0; font-size: 24px; width: 100%; direction: ltr; line-height: 1.4; word-wrap: break-word; overflow-wrap: break-word;">

                    <span>رقم التسجيل:</span>

                    ${siteUrl}

        `;

        document.body.appendChild(wrapper);

        try {

            wrapper.remove(); // مسح اللوحة الخفية بعد التقاط الصورة

            canvas.toBlob(async (blob) => {
                const file = new File([blob], "ISCAE_Result.png", { type: "image/png" });

                const shareText = `الحمدلله الذي بفضله تتم الصالحات\nSemestre ${cleanSemNum} Validé 🎓✅\n\nطالع نتائج ISCAE عبر الرابط:\n${siteUrl}`;
                
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    try { await navigator.share({ title: 'نتيجة ISCAE', text: shareText, files: [file] }); } catch (err) { console.log('User cancelled share'); }
                } else {
                    const link = document.createElement('a'); link.download = 'ISCAE_Result.png'; link.href = canvas.toDataURL(); link.click(); 
                    alert("تم حفظ صورة النتيجة في جهازك بنجاح ✅\n\nقم بمشاركتها مع النص التالي:\n\n" + shareText);

    function displayResults(results) {
        const container = document.getElementById('results-container');
        results.forEach(res => {
            const s = res.student; const f = res.file;
            const isValid = s.decision.toLowerCase().includes('valid') || s.decision.toLowerCase().includes('admis');
            
            const cardId = 'card_' + Math.random().toString(36).substr(2, 9);
            const card = document.createElement('div');
            card.id = cardId;
            card.className = 'result-card'; card.style.display = 'block';
            
            let shareBtnHtml = '';
            if (isValid) {
                shareBtnHtml = `<button class="share-btn" onclick="shareResultCard('${cardId}', '${f.semester}', this)"><i class="fas fa-share-alt"></i> مشاركة النتيجة</button>`;
            }

            card.innerHTML = `
                <div class="card-header-custom">
                    <div class="semester-badge">${f.academic_year} | ${f.major} - ${f.semester}</div>
                    <h2 class="student-name">${s.name}</h2>
                </div>
                <div class="student-info">
                    <div class="info-row"><span>رقم التسجيل:</span> <span class="info-val">${s.id}</span></div>
                    <div class="info-row"><span>المعدل:</span> <span class="info-val" style="color:var(--primary);">${s.avg}</span></div>
                    <div class="info-row"><span>الترتيب:</span> <span class="info-val" style="color:var(--secondary);">${s.rank}</span></div>
                    <div class="info-row"><span>القرار:</span> <span class="info-val ${isValid?'decision-valid':'decision-ratt'}">${s.decision}</span></div>
                </div>
                <button class="download-btn" onclick="downloadPrecisePDF('${s.id}', '${f.details_url}', this)">📥 تنزيل كشف النقاط</button>
                ${shareBtnHtml}
            `;
            container.appendChild(card);
        });
    }

    function showError(msg) { const errEl = document.getElementById('error-msg'); errEl.innerText = msg; errEl.style.display = 'block'; }
    function openTop20Modal() { document.getElementById('top20-modal').style.display = 'flex'; }
    function closeTop20Modal() { document.getElementById('top20-modal').style.display = 'none'; }

    async function fetchAndShowTop20() {
        closeTop20Modal(); resetView();
        const loader = document.getElementById('loader'); loader.style.display = 'block';
        try {
            const { data } = await _supabase.from('results_metadata').select('*').eq('academic_year', document.getElementById('t20-year').value).eq('major', document.getElementById('t20-major').value).eq('level', document.getElementById('t20-level').value).eq('semester', document.getElementById('t20-semester').value).limit(1);
            if (!data[0]) { loader.style.display = 'none'; showError("لا توجد بيانات."); return; }
            
            const students = await fetchRankingData(data[0].ranking_url);
            loader.style.display = 'none';
            const top20 = students.sort((a,b)=>a.rank-b.rank).slice(0, 20);
            const tbody = document.getElementById('top20-body'); tbody.innerHTML = '';
            top20.forEach(s => { tbody.innerHTML += `<tr><td>${s.rank}</td><td><a onclick="triggerQuickSearch('${s.id}')" class="clickable-id">${s.id}</a></td><td>${s.name}</td><td>${s.avg}</td></tr>`; });
            document.getElementById('top20-container').style.display = 'block';
            setTimeout(() => { document.getElementById('top20-container').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 200);
        } catch (e) { loader.style.display = 'none'; }
    }

    function triggerQuickSearch(id) { document.getElementById('matricule').value = id; searchAllSemesters(); }

    async function downloadPrecisePDF(studentId, pdfUrl, btnElement) {
        btnElement.disabled = true; btnElement.innerText = "⏳ جاري القص الدقيق...";
        try {
            const existingPdfBytes = await fetch(pdfUrl).then(res => res.arrayBuffer()); const loadingTask = pdfjsLib.getDocument({ data: existingPdfBytes }); const pdfDocjs = await loadingTask.promise;
            let startPage = -1, startY = 0, endY = 0, spansToNextPage = false, nextPageEndY = 0;

            for (let i = 1; i <= pdfDocjs.numPages; i++) {
                const page = await pdfDocjs.getPage(i); const content = await page.getTextContent(); const items = content.items;
                for (let j=0; j<items.length; j++) {
                    if (items[j].str.replace(/\s+/g, '').includes(studentId)) {
                        startPage = i - 1; startY = items[j].transform[5];
                        let nextStudents = items.filter(itm => itm.str.replace(/\s+/g, '').match(/I\d{4,}/) && itm.transform[5] < startY - 10);
                        if (nextStudents.length > 0) { nextStudents.sort((a, b) => b.transform[5] - a.transform[5]); endY = nextStudents[0].transform[5] + 5; } 
                        else {
                            endY = 20; 
                            if (i < pdfDocjs.numPages) {
                                const nextPage = await pdfDocjs.getPage(i + 1); const nextContent = await nextPage.getTextContent();
                                let page2Students = nextContent.items.filter(itm => itm.str.replace(/\s+/g, '').match(/I\d{4,}/));
                                if (page2Students.length > 0) { spansToNextPage = true; page2Students.sort((a, b) => b.transform[5] - a.transform[5]); nextPageEndY = page2Students[0].transform[5] + 5; }
                            }
                        }
                        break;
                    }
                }
                if (startPage !== -1) break;
            }

            const { PDFDocument } = PDFLib; const pdfDoc = await PDFDocument.load(existingPdfBytes); const newPdf = await PDFDocument.create();
            const[page1] = await newPdf.copyPages(pdfDoc,[startPage]); const { width, height } = page1.getSize();
            const cropTop = Math.min(height, startY + 35); const cropBottom = spansToNextPage ? 0 : endY; 
            page1.setCropBox(0, cropBottom, width, cropTop - cropBottom); newPdf.addPage(page1);

            if (spansToNextPage) { const[page2] = await newPdf.copyPages(pdfDoc,[startPage + 1]); page2.setCropBox(0, nextPageEndY, width, height - nextPageEndY); newPdf.addPage(page2); }

            const pdfBytes = await newPdf.save(); const blob = new Blob([pdfBytes], { type: 'application/pdf' }); const link = document.createElement('a');
            link.href = URL.createObjectURL(blob); link.download = `Resultat_${studentId}.pdf`; link.click();
        } catch (error) { alert("حدث خطأ في معالجة الملف."); }
        finally { btnElement.disabled = false; btnElement.innerText = "📥 تنزيل كشف النقاط"; }
    }
